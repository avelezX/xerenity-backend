# Daily health check: queries all Xerenity tables for data freshness
# and posts a summary Adaptive Card to Microsoft Teams.
name: Daily Health Check
run-name: Running Daily Health Check
on:
  workflow_dispatch:
  schedule:
    # 23:00 UTC = 6:00 PM COT — runs after all collectors finish
    - cron: '0 23 * * *'
jobs:
  health_check:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Run health check
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python3 run_health_check.py
      - name: Notify Slack
        if: failure()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text":"Collector:${{ github.job }} -> ${{ github.workflow }} with status ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
