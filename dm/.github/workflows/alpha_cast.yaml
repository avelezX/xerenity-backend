name: Alphacast EMBI Collector
run-name: Loading Alphacast EMBI Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'  # Todos los lunes a las 7:00 AM UTC

jobs:
  collect_alphacast_embi:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Run Alphacast EMBI Collector
        run: python3 run_collect_alphacast_Embi.py
