# DEPRECATED: totoro.banrep.gov.co/analytics is dead. Use suameca_series.yaml instead.
name: Load BanRep File Series (DEPRECATED)
run-name: Loading BanRep File Series (DEPRECATED)
on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 15 * * 1-5'
jobs:
  collect_daily_prices:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Store BanRep file series
        run: python3 run_collect_banrep_series.py
      - name: Notify Slack
        if: failure()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text":"Collector File:${{ github.job }} -> ${{ github.workflow }} with status ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
