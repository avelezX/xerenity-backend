# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
name: Load HOURLY financial variables
run-name: Loading HOURLY financial variables
on:
  workflow_dispatch:
  schedule:
    #UTC time
    - cron: '20,40,50 17,18 * * 1-5'
jobs:
  collect_daily_prices:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Store daily prices
        run: python3 run_collect_intra_daily.py
