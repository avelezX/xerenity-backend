name: Load DAILY UST Yield Curve
run-name: Loading DAILY UST Yield Curve
on:
  workflow_dispatch:
  schedule:
    #UTC time — Treasury publishes ~3pm ET
    - cron: '0 21 * * 1-5'
jobs:
  collect_ust_curves:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Collect UST nominal + TIPS yield curves
        run: python3 run_collect_ust.py
      - name: Notify Slack
        if: failure()
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text":"Collector File:${{ github.job }} -> ${{ github.workflow }} with status ${{ job.status }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
