# fly.toml app configuration file generated for pysdk on 2024-01-18T17:42:19-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "pysdk"
primary_region = "dfw"
console_command = "/code/manage.py shell"

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = "/code/static"
  url_prefix = "/static/"
