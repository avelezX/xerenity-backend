name: Load DAILY FNC Coffee Price
run-name: Loading DAILY FNC Coffee Price

on:
  workflow_dispatch:
  schedule:
    # 23:00 UTC = 18:00 COT, weekdays (Colombia does not observe DST)
    - cron: '0 23 * * 1-5'

jobs:
  collect_fnc_coffee:
    runs-on: ubuntu-latest
    container:
      image: avelezxerenity/xerenity:latest
      options: --cpus 1

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Collect FNC internal coffee reference price
        run: python run_collect_fnc_coffee.py
        env:
          XTY_URL:          ${{ secrets.XTY_URL }}
          XTY_TOKEN:        ${{ secrets.XTY_TOKEN }}
          COLLECTOR_BEARER: ${{ secrets.COLLECTOR_BEARER }}
